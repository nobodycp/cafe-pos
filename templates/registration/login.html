{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl" id="login-html">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
  <link rel="stylesheet" href="{% static 'app.css' %}">
  <link rel="stylesheet" href="{% static 'login-page.css' %}">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  {% include '_tailwind_config.html' %}
</head>
<body id="login-body" class="app-classic-shell font-sans ds-bg-page text-gray-800 antialiased flex flex-col min-h-screen">

  <header id="login-topbar" class="app-classic-topbar ds-bg-topbar shrink-0 flex items-center gap-2 h-9 px-3 text-[11px] font-semibold text-white">
    <span class="truncate flex-1 text-right">تسجيل الدخول</span>
  </header>

  <div id="login-center" class="flex-1 flex items-center justify-center p-4 min-h-0">
  <div id="login-wrap" class="w-full max-w-md">
    {# Brand / Logo #}
    <div id="login-brand" class="text-center mb-6">
      <div id="login-brand-badge" class="inline-flex items-center justify-center w-14 h-14 rounded-sm ds-brand-mark font-extrabold text-lg mb-3">
        POS
      </div>
      <h1 class="text-2xl font-extrabold text-gray-800">تسجيل الدخول</h1>
      <p class="text-sm text-muted mt-1">أدخل بياناتك للوصول إلى النظام</p>
    </div>

    {# Login Card #}
    <div id="login-card" class="bg-white rounded-sm border border-gray-300 p-6 sm:p-8">
      {% if form.errors %}
      <div id="login-alert" class="bg-danger-light border border-danger/30 rounded-sm px-4 py-3 mb-5 flex items-center gap-3">
        <svg class="w-5 h-5 text-danger flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span class="text-sm font-bold text-danger">بيانات الدخول غير صحيحة.</span>
      </div>
      {% endif %}

      <form id="login-form" method="post">
        {% csrf_token %}
        <div class="field mb-4">
          <label class="block text-sm font-semibold text-muted mb-1.5">اسم المستخدم</label>
          {{ form.username }}
        </div>
        <div class="field field-password mb-6">
          <label class="block text-sm font-semibold text-muted mb-1.5">كلمة المرور</label>
          {{ form.password }}
        </div>
        <button id="login-submit" type="submit"
                class="w-full h-11 rounded-sm ds-btn-primary font-bold text-sm transition-colors border-0">
          دخول
        </button>
      </form>
    </div>

  </div>
  </div>

</body>
</html>

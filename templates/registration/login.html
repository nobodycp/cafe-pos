{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl"
      x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' }"
      :class="darkMode ? 'dark' : ''">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="{% static 'app.css' %}">
  <link rel="stylesheet" href="{% static 'classic-theme.css' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Cairo', 'sans-serif'] },
        colors: {
          primary:  { DEFAULT: '#1e3a5f', dk: '#163051', soft: '#e2e8f0', light: '#3d5a80' },
          success:  { DEFAULT: '#00b894', light: '#e8f8f5' },
          danger:   { DEFAULT: '#d63031', light: '#ffe5e5' },
          warning:  { DEFAULT: '#fdcb6e', light: '#fff8e1' },
          info:     { DEFAULT: '#74b9ff', light: '#eef6ff' },
          surface:  { DEFAULT: '#ffffff', dark: '#1e293b' },
          muted:    '#64748b',
        }
      }
    }
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="app-classic-shell font-sans bg-[#e8eaed] dark:bg-gray-950 text-gray-800 dark:text-gray-100 antialiased flex flex-col min-h-screen">

  <header class="app-classic-topbar shrink-0 flex items-center gap-2 h-9 px-3 text-[11px] font-semibold text-white bg-[#1e3a5f] dark:bg-[#0c1929] border-b border-black/20">
    <span class="truncate flex-1 text-right">تسجيل الدخول</span>
  </header>

  <div class="flex-1 flex items-center justify-center p-4 min-h-0">
  <div class="w-full max-w-md">
    {# Brand / Logo #}
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-sm bg-[#1e3a5f] border border-[#163051] text-white font-extrabold text-lg mb-3">
        POS
      </div>
      <h1 class="text-2xl font-extrabold text-gray-800 dark:text-gray-100">تسجيل الدخول</h1>
      <p class="text-sm text-muted mt-1">أدخل بياناتك للوصول إلى النظام</p>
    </div>

    {# Login Card #}
    <div class="bg-white dark:bg-gray-800 rounded-sm border border-gray-300 dark:border-gray-600 p-6 sm:p-8">
      {% if form.errors %}
      <div class="bg-danger-light dark:bg-danger/10 border border-danger/30 rounded-sm px-4 py-3 mb-5 flex items-center gap-3">
        <svg class="w-5 h-5 text-danger flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span class="text-sm font-bold text-danger">بيانات الدخول غير صحيحة.</span>
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-sm font-semibold text-muted mb-1.5">اسم المستخدم</label>
          {{ form.username }}
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold text-muted mb-1.5">كلمة المرور</label>
          {{ form.password }}
        </div>
        <button type="submit"
                class="w-full h-11 rounded-sm bg-[#1e3a5f] text-white font-bold text-sm hover:bg-[#163051] border border-[#163051] transition-colors">
          دخول
        </button>
      </form>
    </div>

    {# Dark mode toggle #}
    <div class="mt-6 text-center">
      <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)"
              class="inline-flex items-center gap-2 text-sm text-muted hover:text-primary transition-colors">
        <svg x-show="!darkMode" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg x-show="darkMode" x-cloak class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span x-text="darkMode ? 'الوضع الفاتح' : 'الوضع الداكن'"></span>
      </button>
    </div>
  </div>
  </div>

</body>
</html>

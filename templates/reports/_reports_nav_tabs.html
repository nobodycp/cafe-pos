{# شريط تنقل التقارير — مسارات الغلاف فقط #}
{% with u=request.resolver_match.url_name %}
<nav class="ds-shell-subtabs reports-nav-tabs" role="tablist" aria-label="تقارير النظام">
  <a href="{% url 'shell:reports' %}"
     class="ds-shell-subtab{% if u == 'reports' or u == 'dashboard' %} is-active{% endif %}">لوحة</a>
  <a href="{% url 'shell:daily_sales' %}"
     class="ds-shell-subtab{% if u == 'daily_sales' %} is-active{% endif %}">مبيعات يومية</a>
  <a href="{% url 'shell:expense_report' %}"
     class="ds-shell-subtab{% if u == 'expense_report' %} is-active{% endif %}">مصروفات</a>
  <a href="{% url 'shell:weekly_report' %}"
     class="ds-shell-subtab{% if u == 'weekly_report' %} is-active{% endif %}">أسبوعي</a>
  <a href="{% url 'shell:product_movement' %}"
     class="ds-shell-subtab{% if u == 'product_movement' %} is-active{% endif %}">حركة أصناف</a>
  <a href="{% url 'shell:cash_flow' %}"
     class="ds-shell-subtab{% if u == 'cash_flow' %} is-active{% endif %}">تدفق نقدي</a>
  <a href="{% url 'shell:payroll_report' %}"
     class="ds-shell-subtab{% if u == 'payroll_report' %} is-active{% endif %}">موظفون</a>
  <a href="{% url 'shell:payment_channels' %}"
     class="ds-shell-subtab{% if u == 'payment_channels' or u == 'payment_channel_ledger' %} is-active{% endif %}">دفع وتتبع</a>
</nav>
{% endwith %}

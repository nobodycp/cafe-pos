<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إيصال {{ invoice.invoice_number }}</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f4f4; font-family: Tahoma, "Arial Unicode MS", Arial, sans-serif; }
    .pos-embed-wrap {
      padding: 6px 4px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100%;
    }
    #receipt-printable {
      width: 80mm;
      max-width: 100%;
      background: #fff;
      color: #000;
      padding: 0;
      margin: 0;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .no-print { margin-top: 10px; text-align: center; }
    .no-print button {
      padding: 8px 16px; font-size: 12px; font-weight: 800;
      border: 1px solid #000; background: #000; color: #fff; cursor: pointer;
      font-family: Tahoma, sans-serif;
    }
    @media print {
      body { background: #fff; }
      .pos-embed-wrap { padding: 0; margin: 0; display: block; }
      .no-print { display: none !important; }
      #receipt-printable {
        width: 100%;
        max-width: none;
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>
<body>
<div class="pos-embed-wrap">
  <div id="receipt-printable">
    {% include "pos/_receipt_thermal_core.html" %}
  </div>
</div>
<p class="no-print"><button type="button" onclick="window.print()">طباعة</button></p>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إيصال {{ invoice.invoice_number }}</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; font-family: Tahoma, "Arial Unicode MS", Arial, sans-serif; }
    .pos-embed-wrap { padding: 4px; display: flex; justify-content: center; align-items: flex-start; min-height: 100%; }
    #receipt-printable {
      width: 80mm; max-width: 100%; background: #fff; color: #000;
      padding: 3mm 3mm 4mm; font-size: 8px; line-height: 1.2;
      border: none; box-shadow: none;
    }
    .no-print { margin-top: 8px; text-align: center; }
    .no-print button {
      padding: 6px 14px; font-size: 11px; font-weight: 800;
      border: 1px solid #000; background: #000; color: #fff; cursor: pointer;
      font-family: Tahoma, sans-serif;
    }
    @media print {
      body { background: #fff; }
      .pos-embed-wrap { padding: 0; }
      .no-print { display: none !important; }
      #receipt-printable { width: 80mm; box-shadow: none; border: none; }
    }
  </style>
</head>
<body>
<div class="pos-embed-wrap">
  <div id="receipt-printable">
    {% include "pos/_receipt_thermal_core.html" %}
  </div>
</div>
<p class="no-print"><button type="button" onclick="window.print()">طباعة</button></p>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if kitchen_receipt %}مطبخ — طلب #{{ order.pk }}{% else %}إيصال {{ invoice.invoice_number }}{% endif %}</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { background: #f4f4f4; font-family: system-ui, "Segoe UI", Tahoma, "Helvetica Neue", Arial, sans-serif; }
    .pos-embed-wrap {
      padding: 6px 2px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: auto;
    }
    #receipt-printable {
      width: 80mm;
      max-width: 100%;
      background: #fff;
      color: #000;
      padding: 0;
      margin: 0;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .no-print { margin-top: 10px; text-align: center; }
    .no-print button {
      padding: 8px 16px; font-size: 12px; font-weight: 800;
      border: 1px solid #000; background: #000; color: #fff; cursor: pointer;
      font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
    }
    @media print {
      @page { size: 80mm auto; margin: 0; }
      html, body {
        background: #fff !important;
        height: auto !important;
        min-height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 80mm;
      }
      .pos-embed-wrap {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        min-height: 0 !important;
        width: 80mm;
      }
      .no-print { display: none !important; }
      #receipt-printable {
        width: 80mm !important;
        max-width: none !important;
        box-shadow: none !important;
        border: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }
  </style>
</head>
<body>
<div class="pos-embed-wrap">
  <div id="receipt-printable">
    {% include "pos/_receipt_thermal_core.html" %}
  </div>
</div>
<p class="no-print"><button type="button" onclick="window.print()">طباعة</button></p>
</body>
</html>

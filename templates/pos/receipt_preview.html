{% extends "shell/base.html" %}
{% load core_extras %}
{% block title %}إيصال {{ invoice.invoice_number }}{% endblock %}
{% block cashier_body %}

<div class="receipt-screen-wrap flex items-start justify-center min-h-screen p-2 sm:p-3 bg-gray-50 dark:bg-gray-900">
  <div class="w-full max-w-[80mm] bg-white dark:bg-gray-800 shadow-md border border-gray-200 dark:border-gray-700 p-0 overflow-hidden" id="receipt-printable">

    {% include "pos/_receipt_thermal_core.html" %}

    <div class="flex flex-wrap gap-2 p-2 no-print border-t border-gray-100 dark:border-gray-700">
      <button onclick="window.print()"
        class="flex-1 min-w-[6rem] py-2 rounded-lg bg-primary text-white text-xs font-bold
               hover:bg-primary-dk transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-1.5">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        طباعة الإيصال
      </button>
      <a href="{% url 'pos:receipt_raw' invoice.pk %}"
         class="flex-1 min-w-[6rem] py-2 rounded-lg border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300
                text-xs font-bold text-center hover:border-primary hover:text-primary
                transition-all duration-200 no-underline flex items-center justify-center">
        طباعة ESC/POS
      </a>
      <a href="{% url 'pos:main' %}"
         class="flex-1 min-w-[6rem] py-2 rounded-lg border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300
                text-xs font-bold text-center hover:border-primary hover:text-primary
                transition-all duration-200 no-underline flex items-center justify-center">
        عودة
      </a>
    </div>

  </div>
</div>
{% endblock %}

{% block cashier_scripts %}
<style>
@media print {
  @page { size: 80mm auto; margin: 0; }
  html, body {
    height: auto !important;
    min-height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #fff !important;
  }
  .receipt-screen-wrap {
    min-height: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    display: block !important;
    background: #fff !important;
  }
  body * { visibility: hidden !important; }
  #receipt-printable, #receipt-printable * { visibility: visible !important; }
  #receipt-printable {
    position: absolute;
    left: 0;
    top: 0;
    width: 80mm;
    max-width: none;
    margin: 0 !important;
    padding: 0 !important;
    box-shadow: none !important;
    border: none !important;
    border-radius: 0 !important;
    background: #fff !important;
  }
  .no-print { display: none !important; }
}
</style>
{% endblock %}

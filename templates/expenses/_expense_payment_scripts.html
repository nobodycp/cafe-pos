<style>
.expense-pay-btn.pay-on{border-color:#1e3a5f;background:#e2e8f0;color:#0f172a}
.dark .expense-pay-btn.pay-on{border-color:#3b82f6;background:rgba(30,58,95,.4);color:#fff}
</style>
<script>
(function() {
  var form = document.getElementById('expense-form');
  if (!form) return;

  function money(v) {
    var n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  }

  function toastErr(m) {
    (window.shellToast || function(x) { alert(x); })(m, 'error');
  }

  var amountInput = document.getElementById('id_amount');
  var splitToggle = document.getElementById('expense-split-pay-toggle');
  var paySingleWrap = document.getElementById('expense-pay-single');
  var splitsWrap = document.getElementById('expense-pay-splits-wrap');
  var splitsTbody = document.getElementById('expense-pay-splits-tbody');
  var splitsJson = document.getElementById('expense-payment-splits-json');
  var splitAddBtn = document.getElementById('expense-pay-split-add');
  var splitSumHint = document.getElementById('expense-pay-split-sum-hint');
  var methodHidden = document.getElementById('expense-pay-method');
  var payBtns = document.querySelectorAll('.expense-pay-btn');

  var EXPENSE_PM_ROWS = [];
  payBtns.forEach(function(b) {
    EXPENSE_PM_ROWS.push({
      code: (b.dataset.code || '').trim().toLowerCase(),
      label_ar: (b.textContent || '').trim(),
      ledger: b.dataset.ledger || '',
    });
  });

  function expenseAmount() {
    return money(amountInput && amountInput.value);
  }

  function expenseSplitMode() {
    return !!(splitToggle && splitToggle.checked);
  }

  function expensePayRowsSum() {
    if (!splitsTbody) return 0;
    var s = 0;
    splitsTbody.querySelectorAll('input.expense-split-amt').forEach(function(inp) {
      s += money(inp.value);
    });
    return Math.round((s + Number.EPSILON) * 100) / 100;
  }

  function serializeExpenseSplits() {
    if (!splitsJson) return;
    if (!expenseSplitMode()) {
      splitsJson.value = '';
      return;
    }
    var pairs = [];
    if (splitsTbody) {
      splitsTbody.querySelectorAll('tr').forEach(function(tr) {
        var sel = tr.querySelector('select.expense-split-m');
        var am = tr.querySelector('input.expense-split-amt');
        if (!sel || !am) return;
        var c = (sel.value || '').trim().toLowerCase();
        var v = money(am.value);
        if (c && v > 0) pairs.push([c, v]);
      });
    }
    splitsJson.value = pairs.length ? JSON.stringify(pairs) : '';
  }

  function syncExpenseSplitHint() {
    if (!splitSumHint) return;
    var target = expenseAmount();
    var sum = expensePayRowsSum();
    var r = target - sum;
    var tail = '';
    if (target <= 0) tail = ' — أدخل مبلغ المصروف أولاً';
    else if (Math.abs(r) > 0.005) tail = r > 0 ? (' — نقص: ' + r.toFixed(2)) : (' — زيادة: ' + (-r).toFixed(2));
    else tail = ' — متطابق';
    splitSumHint.textContent = 'المجموع: ' + sum.toFixed(2) + ' — مبلغ المصروف: ' + target.toFixed(2) + tail;
  }

  function addExpenseSplitRow(methodCode, amountStr) {
    if (!splitsTbody || !EXPENSE_PM_ROWS.length) return;
    var tr = document.createElement('tr');
    tr.className = 'border-b border-gray-100 dark:border-gray-700';
    var tdM = document.createElement('td');
    tdM.className = 'p-1';
    var sel = document.createElement('select');
    sel.className =
      'expense-split-m w-full min-w-0 rounded border border-gray-300 bg-white px-1 py-0.5 dark:border-gray-600 dark:bg-gray-900';
    EXPENSE_PM_ROWS.forEach(function(r) {
      var o = document.createElement('option');
      o.value = r.code;
      o.textContent = r.label_ar;
      if (r.code === (methodCode || '').toLowerCase()) o.selected = true;
      sel.appendChild(o);
    });
    tdM.appendChild(sel);
    var tdA = document.createElement('td');
    tdA.className = 'p-1 text-end';
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.step = '0.01';
    inp.min = '0';
    inp.className =
      'expense-split-amt w-full rounded border border-gray-300 px-1 py-0.5 text-end tabular-nums dark:border-gray-600 dark:bg-gray-900';
    inp.placeholder = '0.00';
    if (amountStr != null && amountStr !== '') inp.value = String(amountStr);
    tdA.appendChild(inp);
    var tdX = document.createElement('td');
    tdX.className = 'p-1 text-center';
    var rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'cursor-pointer border-0 bg-transparent text-[11px] font-bold text-danger';
    rm.textContent = '×';
    rm.addEventListener('click', function() {
      tr.remove();
      serializeExpenseSplits();
      syncExpenseSplitHint();
    });
    tdX.appendChild(rm);
    tr.appendChild(tdM);
    tr.appendChild(tdA);
    tr.appendChild(tdX);
    splitsTbody.appendChild(tr);
    sel.addEventListener('change', function() {
      serializeExpenseSplits();
      syncExpenseSplitHint();
    });
    inp.addEventListener('input', function() {
      serializeExpenseSplits();
      syncExpenseSplitHint();
    });
    serializeExpenseSplits();
    syncExpenseSplitHint();
  }

  function selectPay(btn) {
    if (!btn || !methodHidden) return;
    methodHidden.value = btn.dataset.code || '';
    payBtns.forEach(function(b) {
      b.classList.toggle('pay-on', b === btn);
    });
  }

  payBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      selectPay(btn);
    });
  });

  if (splitToggle) {
    splitToggle.addEventListener('change', function() {
      if (splitToggle.checked) {
        if (paySingleWrap) paySingleWrap.classList.add('hidden');
        if (splitsWrap) splitsWrap.classList.remove('hidden');
        if (splitsTbody && !splitsTbody.children.length) {
          var m =
            (methodHidden && methodHidden.value) ||
            (EXPENSE_PM_ROWS[0] && EXPENSE_PM_ROWS[0].code) ||
            'cash';
          var t = expenseAmount();
          addExpenseSplitRow(m, t > 0 ? t.toFixed(2) : '');
        }
      } else {
        if (splitsWrap) splitsWrap.classList.add('hidden');
        if (paySingleWrap) paySingleWrap.classList.remove('hidden');
        if (splitsTbody) splitsTbody.innerHTML = '';
        if (splitsJson) splitsJson.value = '';
      }
      serializeExpenseSplits();
      syncExpenseSplitHint();
    });
  }

  if (splitAddBtn) {
    splitAddBtn.addEventListener('click', function() {
      if (!expenseSplitMode()) return;
      var m =
        (methodHidden && methodHidden.value) ||
        (EXPENSE_PM_ROWS[0] && EXPENSE_PM_ROWS[0].code) ||
        'cash';
      addExpenseSplitRow(m, '');
      serializeExpenseSplits();
      syncExpenseSplitHint();
    });
  }

  if (amountInput) {
    amountInput.addEventListener('input', function() {
      serializeExpenseSplits();
      syncExpenseSplitHint();
    });
  }

  function hydrate() {
    var stateNode = document.getElementById('expense-form-state');
    var initialState = {};
    if (stateNode) {
      try {
        initialState = JSON.parse(stateNode.textContent.trim() || '{}') || {};
      } catch (e) {
        initialState = {};
      }
    }
    var useSp = initialState.use_payment_splits;
    if (useSp === '1' || useSp === 1 || useSp === true) {
      if (splitToggle) splitToggle.checked = true;
      if (paySingleWrap) paySingleWrap.classList.add('hidden');
      if (splitsWrap) splitsWrap.classList.remove('hidden');
      if (splitsTbody && initialState.payment_splits_json) {
        splitsTbody.innerHTML = '';
        try {
          var sp = JSON.parse(initialState.payment_splits_json);
          if (Array.isArray(sp)) {
            sp.forEach(function(item) {
              var c = Array.isArray(item) ? item[0] : item && item.method;
              var a = Array.isArray(item) ? item[1] : item && item.amount;
              if (c) addExpenseSplitRow(String(c).toLowerCase(), a != null && a !== '' ? String(a) : '');
            });
          }
        } catch (e3) {}
      }
    } else if (initialState.payment_method) {
      var btn = Array.prototype.find.call(payBtns, function(b) {
        return b.dataset.code === initialState.payment_method;
      });
      if (btn) selectPay(btn);
      else if (methodHidden) methodHidden.value = initialState.payment_method;
    }
    if (!expenseSplitMode() && payBtns.length && (!methodHidden || !methodHidden.value)) {
      selectPay(payBtns[0]);
    }
    serializeExpenseSplits();
    syncExpenseSplitHint();
  }

  form.addEventListener('submit', function(ev) {
    if (expenseSplitMode()) {
      serializeExpenseSplits();
      var target = expenseAmount();
      var sum = expensePayRowsSum();
      if (target <= 0) {
        ev.preventDefault();
        toastErr('أدخل مبلغ المصروف.');
        return;
      }
      if (Math.abs(sum - target) > 0.005) {
        ev.preventDefault();
        toastErr('مجموع أسطر الدفع يجب أن يساوي مبلغ المصروف.');
        return;
      }
      if (!splitsTbody || !splitsTbody.querySelector('tr')) {
        ev.preventDefault();
        toastErr('أضف سطر دفع واحداً على الأقل.');
        return;
      }
    } else {
      if (splitsJson) splitsJson.value = '';
      if (!methodHidden || !methodHidden.value) {
        ev.preventDefault();
        toastErr('اختر طريقة الدفع.');
        return;
      }
    }
  });

  hydrate();
})();
</script>

{% load static %}
<style>
.expense-pay-btn.pay-on{border-color:#1e3a5f;background:#e2e8f0;color:#0f172a}
.dark .expense-pay-btn.pay-on{border-color:#3b82f6;background:rgba(30,58,95,.4);color:#fff}
</style>
<script src="{% static 'js/payment_splits_ui.js' %}"></script>
<script>
(function() {
  var form =
    document.getElementById('expense-form') ||
    document.querySelector('form[data-shell-panel-form]');
  if (!form) return;

  var payBtns = document.querySelectorAll('.expense-pay-btn');
  var pmRows = [];
  payBtns.forEach(function(b) {
    pmRows.push({
      code: (b.dataset.code || '').trim().toLowerCase(),
      label_ar: (b.textContent || '').trim(),
      ledger: b.dataset.ledger || '',
    });
  });

  PaymentSplitsUI.bind({
    form: form,
    amountInput: document.getElementById('id_amount'),
    splitToggle: document.getElementById('expense-split-pay-toggle'),
    paySingleWrap: document.getElementById('expense-pay-single'),
    splitsWrap: document.getElementById('expense-pay-splits-wrap'),
    splitsTbody: document.getElementById('expense-pay-splits-tbody'),
    splitsJson: document.getElementById('expense-payment-splits-json'),
    splitAddBtn: document.getElementById('expense-pay-split-add'),
    splitSumHint: document.getElementById('expense-pay-split-sum-hint'),
    methodHidden: document.getElementById('expense-pay-method'),
    payBtns: payBtns,
    stateNode: document.getElementById('expense-form-state'),
    pmRows: pmRows,
    amountRequiredMsg: 'أدخل مبلغ المصروف.',
    sumMismatchMsg: 'مجموع أسطر الدفع يجب أن يساوي مبلغ المصروف.',
  });
})();
</script>

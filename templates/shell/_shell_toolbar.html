{% comment %}Unified shell page toolbar (title + optional hint + back to POS).{% endcomment %}
<div class="pos-shell-toolbar shrink-0 flex flex-wrap items-center gap-2 px-3 py-2">
  <span class="pos-shell-toolbar-title">{{ toolbar_title }}</span>
  {% if toolbar_hint %}
  <span class="pos-shell-toolbar-hint hidden lg:inline">{{ toolbar_hint }}</span>
  {% endif %}
  <span class="flex-1"></span>
  {% include "shell/_shell_toolbar_back.html" %}
</div>

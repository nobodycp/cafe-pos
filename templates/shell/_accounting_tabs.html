{# accounting_tab: chart | trial | pnl | journal | journal_detail | treasury | ledger (ledger يبرّز دليل الحسابات) #}
<div class="flex flex-wrap gap-1.5 items-center mb-3" role="tablist" aria-label="أقسام المحاسبة">
  <a href="{% url 'shell:accounting_chart' %}"
     class="h-8 px-3 rounded-lg font-bold text-xs inline-flex items-center whitespace-nowrap {% if accounting_tab == 'chart' or accounting_tab == 'ledger' %}bg-primary text-white{% else %}border border-primary text-primary{% endif %}">دليل الحسابات</a>
  <a href="{% url 'shell:trial_balance' %}"
     class="h-8 px-3 rounded-lg font-bold text-xs inline-flex items-center whitespace-nowrap {% if accounting_tab == 'trial' %}bg-primary text-white{% else %}border border-primary text-primary{% endif %}">ميزان المراجعة</a>
  <a href="{% url 'shell:pnl' %}"
     class="h-8 px-3 rounded-lg font-bold text-xs inline-flex items-center whitespace-nowrap {% if accounting_tab == 'pnl' %}bg-primary text-white{% else %}border border-primary text-primary{% endif %}">الأرباح والخسائر</a>
  <a href="{% url 'shell:journal_list' %}"
     class="h-8 px-3 rounded-lg font-bold text-xs inline-flex items-center whitespace-nowrap {% if accounting_tab == 'journal' or accounting_tab == 'journal_detail' %}bg-primary text-white{% else %}border border-primary text-primary{% endif %}">القيود اليومية</a>
  <a href="{% url 'shell:accounting_treasury' %}"
     class="h-8 px-3 rounded-lg font-bold text-xs inline-flex items-center whitespace-nowrap {% if accounting_tab == 'treasury' %}bg-primary text-white{% else %}border border-primary text-primary{% endif %}">سندات الصندوق</a>
</div>

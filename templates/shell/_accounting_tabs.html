{# accounting_tab: chart | trial | pnl | journal | journal_detail | treasury | ledger (ledger يبرّز دليل الحسابات) #}
<div class="ds-shell-subtabs" role="tablist" aria-label="أقسام المحاسبة">
  <a href="{% url 'shell:accounting_chart' %}"
     class="ds-shell-subtab{% if accounting_tab == 'chart' or accounting_tab == 'ledger' %} is-active{% endif %}">دليل الحسابات</a>
  <a href="{% url 'shell:trial_balance' %}"
     class="ds-shell-subtab{% if accounting_tab == 'trial' %} is-active{% endif %}">ميزان المراجعة</a>
  <a href="{% url 'shell:pnl' %}"
     class="ds-shell-subtab{% if accounting_tab == 'pnl' %} is-active{% endif %}">الأرباح والخسائر</a>
  <a href="{% url 'shell:journal_list' %}"
     class="ds-shell-subtab{% if accounting_tab == 'journal' or accounting_tab == 'journal_detail' %} is-active{% endif %}">القيود اليومية</a>
  <a href="{% url 'shell:accounting_treasury' %}"
     class="ds-shell-subtab{% if accounting_tab == 'treasury' %} is-active{% endif %}">سندات الصندوق</a>
</div>

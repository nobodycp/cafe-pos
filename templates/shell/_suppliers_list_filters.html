{# فلاتر قائمة الموردين — نفس أسلوب تقرير «دفع وتتبع» #}
<details class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 mb-3 overflow-hidden [&_summary::-webkit-details-marker]:hidden"
  {% if filters_open %}open{% endif %}>
  <summary class="px-3 py-2.5 text-xs font-extrabold text-gray-700 dark:text-gray-200 cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-700/40 flex items-center justify-between gap-2 list-none">
    <span>فلاتر البحث والعرض</span>
    <span class="text-[10px] font-semibold text-muted shrink-0">اضغط للإظهار / الإخفاء</span>
  </summary>
  <div class="px-3 pb-3 pt-0 border-t border-gray-100 dark:border-gray-700">
    <form method="get" class="flex flex-col gap-3 pt-2">
      <input type="hidden" name="per_page" value="{{ per_page }}">
      <div class="flex flex-wrap gap-2 items-end">
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">عميل مرتبط</label>
          <select name="linked" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[9.5rem]">
            {% for code, label in linked_filter_choices %}
            <option value="{{ code }}"{% if supplier_filters.linked == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">بائع نسبة</label>
          <select name="commission" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[9.5rem]">
            {% for code, label in commission_filter_choices %}
            <option value="{{ code }}"{% if supplier_filters.commission == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">بعد المسحوبات</label>
          <select name="net_side" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[11rem]">
            {% for code, label in net_side_choices %}
            <option value="{{ code }}"{% if supplier_filters.net_side == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">ترتيب العرض</label>
          <select name="sort" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[12rem]">
            {% for code, label in supplier_sort_choices %}
            <option value="{{ code }}"{% if supplier_filters.sort == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">رصيد المورد من</label>
          <input type="text" inputmode="decimal" name="min_balance" value="{{ supplier_filters.min_balance_s }}" placeholder="0" class="h-8 w-[6.5rem] rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 tabular-nums">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">رصيد المورد إلى</label>
          <input type="text" inputmode="decimal" name="max_balance" value="{{ supplier_filters.max_balance_s }}" placeholder="∞" class="h-8 w-[6.5rem] rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 tabular-nums">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">بعد المسحوبات من</label>
          <input type="text" inputmode="decimal" name="min_net" value="{{ supplier_filters.min_net_s }}" placeholder="0" class="h-8 w-[6.5rem] rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 tabular-nums">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">بعد المسحوبات إلى</label>
          <input type="text" inputmode="decimal" name="max_net" value="{{ supplier_filters.max_net_s }}" placeholder="∞" class="h-8 w-[6.5rem] rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 tabular-nums">
        </div>
        <div class="flex-1 min-w-[12rem] max-w-xl">
          <label class="block text-[11px] font-bold text-muted mb-0.5">بحث (الاسم، الهاتف، البريد)</label>
          <input type="search" name="q" value="{{ supplier_filters.q }}" placeholder="مثال: أحمد، 05…" class="ds-input w-full h-8 text-xs">
        </div>
        <button type="submit" class="h-8 px-3 rounded-sm bg-primary text-white text-xs font-bold shrink-0">تطبيق</button>
        <a href="{% url 'shell:suppliers' %}?per_page={{ per_page }}" class="h-8 px-3 rounded-sm border border-gray-300 dark:border-gray-600 text-xs font-bold text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 inline-flex items-center shrink-0 hover:bg-gray-50 dark:hover:bg-gray-700">مسح الفلاتر</a>
      </div>
      <label class="inline-flex items-center gap-2 cursor-pointer text-xs font-semibold text-gray-800 dark:text-gray-100">
        <input type="hidden" name="hide_zero_net" value="0">
        <input type="checkbox" name="hide_zero_net" value="1" class="h-4 w-4 rounded border-gray-300" {% if supplier_filters.hide_zero_net %}checked{% endif %}>
        <span>إخفاء من رصيدهم بعد المسحوبات = 0 <span class="font-normal text-muted">(رصيد المورد − مسحوبات العميل = 0)</span></span>
      </label>
    </form>
  </div>
</details>

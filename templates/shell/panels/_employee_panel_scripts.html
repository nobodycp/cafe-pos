<script>
(function () {
  var payType = document.getElementById("id_pay_type");
  var label = document.getElementById("panel-salary-amount-label");
  if (!payType || !label) return;
  function sync() {
    if (payType.value === "hourly") label.textContent = "أجر الساعة";
    else if (payType.value === "monthly") label.textContent = "راتب الشهر";
    else label.textContent = "أجر اليوم";
  }
  payType.addEventListener("change", sync);
  sync();
})();
</script>
<script>
(function () {
  if (typeof CafeCustomerAutocomplete === 'undefined') return;
  var hidden = document.getElementById('id_linked_customer');
  var input = document.getElementById('panel-employee-linked-customer-search');
  var hits = document.getElementById('panel-employee-linked-customer-hits');
  var clearBtn = document.getElementById('panel-employee-linked-customer-clear');
  if (!hidden || !input || !hits) return;
  if (input.getAttribute('data-emp-ac-bound') === '1') return;
  input.setAttribute('data-emp-ac-bound', '1');
  function toggleClear() {
    if (!clearBtn) return;
    if (hidden.value) clearBtn.classList.remove('hidden');
    else clearBtn.classList.add('hidden');
  }
  CafeCustomerAutocomplete.bind({
    searchUrl: '{% url "pos:customers_search" %}',
    input: input,
    hits: hits,
    hidden: hidden,
    debounce: 200,
    nameOnlyHits: true,
    hitClass: 'cust-ac-hit',
    arrowNav: true,
    useDisplayNone: true,
    useFixedPanel: true,
    onPick: function () { toggleClear(); }
  });
  if (clearBtn) {
    clearBtn.addEventListener('click', function () {
      hidden.value = '';
      input.value = '';
      toggleClear();
      input.focus();
    });
  }
  toggleClear();
})();
</script>

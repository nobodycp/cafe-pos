{% if errors %}<div class="mb-2">{% for e in errors %}<p class="text-danger text-[10px]">{{ e }}</p>{% endfor %}</div>{% endif %}
<div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
  <div><label class="text-[10px] font-bold">اسم المنتج</label><input type="text" name="name_ar" required class="ds-input w-full text-[11px]"></div>
  <div><label class="text-[10px] font-bold">سعر البيع</label><input type="number" name="selling_price" step="0.01" value="0" class="ds-input w-full text-[11px]"></div>
  <div class="relative"><label class="text-[10px] font-bold">التصنيف</label><input type="hidden" name="category" class="manufacture-category-id"><input type="text" class="manufacture-category-search ds-input w-full text-[11px]" autocomplete="off" data-category-search-url="{% url 'shell:category_search' %}" data-category-create-url="{% url 'shell:category_quick_create' %}"></div>
  <div><label class="text-[10px] font-bold">الوحدة</label><select name="unit" class="ds-input w-full text-[11px]"><option value="">—</option>{% for u in units %}<option value="{{ u.pk }}">{{ u.name_ar }}</option>{% endfor %}</select></div>
</div>
<table class="w-full text-[10px] border"><thead><tr><th>#</th><th>مكوّن</th><th>كمية</th><th>وحدة</th></tr></thead><tbody>{% for i in range10 %}<tr class="manufacture-line {% if i > 0 %}hidden{% endif %}"><td>{{ forloop.counter }}</td><td><select name="component_{{ i }}" class="ds-input w-full text-[11px]"><option value="">—</option>{% for c in components %}<option value="{{ c.pk }}">{{ c.name_ar }}</option>{% endfor %}</select></td><td><input type="number" name="qty_{{ i }}" step="0.0001" class="ds-input w-full text-[11px]"></td><td><select name="unit_mode_{{ i }}" class="ds-input text-[11px]"><option value="base">أساسية</option><option value="gram">غرام</option><option value="ml">مل</option></select></td></tr>{% endfor %}</tbody></table>

<script>
(function() {
  var form = document.querySelector('.recipe-add-form[data-raw-materials-search-url]');
  if (!form) return;
  var SEARCH_URL = form.dataset.rawMaterialsSearchUrl || '';

  document.querySelectorAll('.manufacture-row-add').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var wrap = btn.closest('.manufacture-form') || btn.closest('.recipe-add-form');
      var next = wrap && wrap.querySelector('.manufacture-line.hidden');
      if (!next) return;
      next.classList.remove('hidden');
      var inp = next.querySelector('.recipe-component-search');
      if (inp) inp.focus();
    });
  });

  function debounce(fn, ms) {
    var t;
    return function() {
      var args = arguments;
      var self = this;
      clearTimeout(t);
      t = setTimeout(function() { fn.apply(self, args); }, ms);
    };
  }

  function hideHits(hits, row) {
    if (hits) {
      hits.innerHTML = '';
      hits.classList.add('hidden');
    }
    if (row) row.classList.remove('recipe-line-popover-open');
  }

  function attachRow(row) {
    var hid = row.querySelector('.recipe-component-id');
    var inp = row.querySelector('.recipe-component-search');
    var hits = row.querySelector('.recipe-ac-hits');
    if (!hid || !inp || !hits) return;

    var activeIdx = -1;

    function setSelected(id, label) {
      hid.value = id || '';
      inp.value = label || '';
      if (label) inp.dataset.lockedLabel = label;
      else delete inp.dataset.lockedLabel;
      hideHits(hits, row);
      var qty = row.querySelector('input[name^="qty_"]');
      if (qty) qty.focus();
    }

    function renderHits(items) {
      hits.innerHTML = '';
      activeIdx = items.length ? 0 : -1;
      items.forEach(function(it, i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'purchase-ac-hit w-full text-start px-2 py-1.5 text-[11px] hover:bg-gray-100 dark:hover:bg-gray-700' + (i === 0 ? ' ac-active bg-gray-50 dark:bg-gray-700' : '');
        b.textContent = it.name_ar + (it.unit_name ? ' — ' + it.unit_name : '');
        b.addEventListener('mousedown', function(e) {
          e.preventDefault();
          setSelected(String(it.id), it.name_ar + (it.unit_name ? ' — ' + it.unit_name : ''));
        });
        hits.appendChild(b);
      });
      if (items.length) {
        hits.classList.remove('hidden');
        row.classList.add('recipe-line-popover-open');
      } else {
        hideHits(hits, row);
      }
    }

    var runSearch = debounce(function() {
      var q = inp.value.trim();
      var locked = (inp.dataset.lockedLabel || '').trim();
      if (hid.value && locked && q === locked) {
        hideHits(hits, row);
        return;
      }
      hid.value = '';
      delete inp.dataset.lockedLabel;
      if (q.length < 1) {
        hideHits(hits, row);
        return;
      }
      fetch(SEARCH_URL + '?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) { renderHits(data.results || []); })
        .catch(function() { hideHits(hits, row); });
    }, 220);

    inp.addEventListener('input', runSearch);
    inp.addEventListener('keydown', function(e) {
      var btns = hits.querySelectorAll('.purchase-ac-hit');
      if (e.key === 'Escape') {
        hideHits(hits, row);
        return;
      }
      if (e.key === 'ArrowDown' && btns.length) {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, btns.length - 1);
        btns.forEach(function(b, j) { b.classList.toggle('ac-active', j === activeIdx); });
        return;
      }
      if (e.key === 'ArrowUp' && btns.length) {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        btns.forEach(function(b, j) { b.classList.toggle('ac-active', j === activeIdx); });
        return;
      }
      if ((e.key === 'Enter' || e.key === 'Tab') && btns.length && activeIdx >= 0) {
        e.preventDefault();
        btns[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
      }
    });
    inp.addEventListener('blur', function() {
      setTimeout(function() { hideHits(hits, row); }, 150);
    });
  }

  form.querySelectorAll('.recipe-line').forEach(attachRow);

  document.addEventListener('mousedown', function(e) {
    if (e.target.closest('.recipe-component-cell')) return;
    form.querySelectorAll('.recipe-ac-hits').forEach(function(h) {
      h.classList.add('hidden');
    });
    form.querySelectorAll('.recipe-line-popover-open').forEach(function(r) {
      r.classList.remove('recipe-line-popover-open');
    });
  });
})();
</script>

<div class="shell-list-filters__field shell-list-filters__field--grow flex-1 min-w-[12rem] max-w-xl">
  <label class="block text-[11px] font-bold text-muted mb-0.5" for="rm-filter-q">بحث</label>
  <input type="search" id="rm-filter-q" name="q" value="{{ filter_q }}" placeholder="اسم أو باركود" class="ds-input w-full h-8 text-xs">
</div>
<div class="shell-list-filters__field min-w-[9rem]">
  <label class="block text-[11px] font-bold text-muted mb-0.5" for="rm-filter-stock">حالة الرصيد</label>
  <select id="rm-filter-stock" name="stock" class="ds-input h-8 text-xs w-full">
    <option value=""{% if not filter_stock %} selected{% endif %}>الكل</option>
    <option value="low"{% if filter_stock == "low" %} selected{% endif %}>منخفض</option>
    <option value="positive"{% if filter_stock == "positive" %} selected{% endif %}>رصيد &gt; 0</option>
    <option value="zero"{% if filter_stock == "zero" %} selected{% endif %}>رصيد = 0</option>
  </select>
</div>

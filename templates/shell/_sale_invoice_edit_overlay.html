{# نافذة منبثقة لتعديل فاتورة البيع — غلاف التشغيل #}
<div id="shell-invoice-edit-overlay" class="fixed inset-0 z-[400] flex items-center justify-center p-2 sm:p-3" style="display:none" role="dialog" aria-modal="true" aria-labelledby="shell-invoice-edit-title">
  <button type="button" id="shell-invoice-edit-backdrop" class="absolute inset-0 cursor-default border-0 bg-black/50 p-0" aria-label="إغلاق"></button>
  <div class="relative z-[1] flex w-full max-w-[min(32rem,96vw)] max-h-[min(88vh,720px)] flex-col overflow-hidden rounded-lg border border-gray-300 bg-white shadow-2xl dark:border-gray-600 dark:bg-gray-900" dir="rtl">
    <div class="flex shrink-0 items-center justify-between gap-2 border-b border-gray-200 bg-gray-100 px-3 py-2 dark:border-gray-700 dark:bg-gray-800">
      <span id="shell-invoice-edit-title" class="text-xs sm:text-sm font-bold text-gray-800 dark:text-gray-100">تعديل الفاتورة</span>
      <button type="button" id="shell-invoice-edit-close" class="rounded border border-gray-300 bg-white px-2 py-1 text-[11px] font-bold text-gray-700 hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-900 dark:text-gray-200">إغلاق</button>
    </div>
    <div id="shell-invoice-edit-mount" class="min-h-0 flex-1 overflow-y-auto bg-white dark:bg-gray-950">
      <p class="p-4 text-center text-xs text-muted">جاري التحميل…</p>
    </div>
  </div>
</div>

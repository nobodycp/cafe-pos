{# فلاتر قائمة المنتجات — نفس أسلوب تقرير «دفع وتتبع» #}
<details class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 mb-3 overflow-hidden [&_summary::-webkit-details-marker]:hidden"
  {% if filters_open %}open{% endif %}>
  <summary class="px-3 py-2.5 text-xs font-extrabold text-gray-700 dark:text-gray-200 cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-700/40 flex items-center justify-between gap-2 list-none">
    <span>فلاتر البحث والعرض</span>
    <span class="text-[10px] font-semibold text-muted shrink-0">اضغط للإظهار / الإخفاء</span>
  </summary>
  <div class="px-3 pb-3 pt-0 border-t border-gray-100 dark:border-gray-700">
    <form method="get" class="flex flex-col gap-3 pt-2">
      <input type="hidden" name="tab" value="{{ active_tab }}">
      <input type="hidden" name="per_page" value="{{ per_page }}">
      <div class="flex flex-wrap gap-2 items-end">
        {% if active_tab == "products" %}
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">التصنيف</label>
          <select name="category" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[9rem]">
            <option value="">كل التصنيفات</option>
            {% for cat in filter_category_options %}
            <option value="{{ cat.pk }}"{% if product_filters.category_id == cat.pk %} selected{% endif %}>{{ cat.name_ar }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">نوع المنتج</label>
          <select name="product_type" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[9rem]">
            <option value="">كل الأنواع</option>
            {% for code, label in product_type_choices %}
            <option value="{{ code }}"{% if product_filters.product_type == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">الحالة</label>
          <select name="active" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[7rem]">
            {% for code, label in active_filter_choices %}
            <option value="{{ code }}"{% if product_filters.active == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">المخزون</label>
          <select name="stock" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[8.5rem]">
            {% for code, label in stock_filter_choices %}
            <option value="{{ code }}"{% if product_filters.stock == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">ترتيب العرض</label>
          <select name="sort" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[11rem]">
            {% for code, label in product_sort_choices %}
            <option value="{{ code }}"{% if product_filters.sort == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="flex-1 min-w-[12rem] max-w-xl">
          <label class="block text-[11px] font-bold text-muted mb-0.5">بحث (الاسم، الإنجليزي، الباركود)</label>
          <input type="search" name="q" value="{{ product_filters.q }}" placeholder="مثال: كولا، 629…" class="ds-input w-full h-8 text-xs">
        </div>
        {% elif active_tab == "units" %}
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">ترتيب العرض</label>
          <select name="sort" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[10rem]">
            {% for code, label in unit_sort_choices %}
            <option value="{{ code }}"{% if unit_filters.sort == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="flex-1 min-w-[12rem] max-w-xl">
          <label class="block text-[11px] font-bold text-muted mb-0.5">بحث (الاسم، الرمز)</label>
          <input type="search" name="q" value="{{ unit_filters.q }}" placeholder="مثال: كيلو، kg…" class="ds-input w-full h-8 text-xs">
        </div>
        {% else %}
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">التصنيف الرئيسي</label>
          <select name="parent" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[10rem]">
            {% for code, label in parent_filter_choices %}
            <option value="{{ code }}"{% if category_filters.parent == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
            {% for cat in filter_parent_options %}
            <option value="{{ cat.pk }}"{% if category_filters.parent == cat.pk %} selected{% endif %}>تحت: {{ cat.name_ar }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">الحالة</label>
          <select name="active" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[7rem]">
            {% for code, label in active_filter_choices %}
            <option value="{{ code }}"{% if category_filters.active == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-muted mb-0.5">ترتيب العرض</label>
          <select name="sort" class="h-8 rounded-sm border border-gray-300 dark:border-gray-600 px-2 text-xs bg-white dark:bg-gray-700 min-w-[10rem]">
            {% for code, label in category_sort_choices %}
            <option value="{{ code }}"{% if category_filters.sort == code %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="flex-1 min-w-[12rem] max-w-xl">
          <label class="block text-[11px] font-bold text-muted mb-0.5">بحث في التصنيفات</label>
          <input type="search" name="q" value="{{ category_filters.q }}" placeholder="اسم التصنيف…" class="ds-input w-full h-8 text-xs">
        </div>
        {% endif %}
        <button type="submit" class="h-8 px-3 rounded-sm bg-primary text-white text-xs font-bold shrink-0">تطبيق</button>
        <a href="{% url 'shell:product_list' %}?tab={{ active_tab }}&amp;per_page={{ per_page }}" class="h-8 px-3 rounded-sm border border-gray-300 dark:border-gray-600 text-xs font-bold text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 inline-flex items-center shrink-0 hover:bg-gray-50 dark:hover:bg-gray-700">مسح الفلاتر</a>
      </div>
    </form>
  </div>
</details>

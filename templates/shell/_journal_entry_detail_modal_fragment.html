{% load humanize %}
<div id="journal-entry-detail-compact" class="journal-entry-detail-modal p-2 sm:p-2.5" dir="rtl">

.journal-entry-detail-modal .journal-entry-detail-table-region,
#journal-entry-detail-compact .journal-entry-detail-table-region{

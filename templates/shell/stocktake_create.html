{% extends "shell/base.html" %}
{% block title %}جرد جديد{% endblock %}
{% block cashier_body %}
<div class="pos-shell-page flex flex-col flex-1 min-h-0 overflow-hidden">
  <div class="pos-shell-toolbar shrink-0 flex items-center gap-2 px-3 py-2"><span class="pos-shell-toolbar-title">بدء جرد جديد</span><span class="flex-1"></span><a href="{% url 'shell:stocktake_list' %}" class="text-xs font-bold text-primary">← الجرد</a></div>
  <div class="pos-shell-content flex-1 min-h-0 overflow-y-auto overflow-x-hidden p-3">
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 max-w-xl">
      <p class="text-muted text-sm mb-5">سيتم إنشاء جرد يحتوي على جميع الأصناف المتتبعة بالمخزون مع كمياتها الحالية في النظام.</p>
      <form method="post">{% csrf_token %}<div class="mb-5"><label>ملاحظات</label><textarea name="note" rows="3" placeholder="مثلاً: جرد نهاية الشهر"></textarea></div><button type="submit" class="h-11 px-6 rounded-lg bg-primary text-white font-bold text-sm">بدء الجرد</button></form>
    </div>
  </div>
</div>
{% endblock %}

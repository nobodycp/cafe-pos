{# يُضمَّن في purchase_new و purchase_form — بحث منتجات + إنشاء سريع #}
<div id="purchase-api-config" class="hidden"
     data-search-url="{% url 'shell:purchase_products_search' %}"
     data-create-url="{% url 'shell:purchase_product_quick_create' %}"
     data-supplier-search-url="{% url 'shell:purchase_suppliers_search' %}"
     data-supplier-create-url="{% url 'shell:purchase_supplier_quick_create' %}"
     data-unit-search-url="{% url 'shell:purchase_units_search' %}"
     data-unit-create-url="{% url 'shell:purchase_unit_quick_create' %}"></div>
<style>
/* عرض افتراضي داخل الجدول؛ عند التثبيت viewport يُضبط العرض من JS */
.purchase-ac-hits{max-height:min(320px,55vh);overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);width:100%;min-width:0;box-sizing:border-box;}
.purchase-ac-hits.purchase-ac-hits--fixed{max-height:min(320px,50vh);}
.purchase-ac-hit{display:block;width:100%;text-align:right;padding:.5rem .75rem;font-size:.875rem;border:0;background:none;cursor:pointer;font-family:inherit;}
.purchase-ac-hit:hover,.purchase-ac-hit.ac-active{background:#eef0ff;}
.dark .purchase-ac-hit:hover,.dark .purchase-ac-hit.ac-active{background:rgba(108,92,231,.15);}
.purchase-line.is-empty:not(.is-visible){display:none}
.purchase-pay-btn.pay-on{border-color:#1e3a5f;background:#e2e8f0;color:#0f172a}
.dark .purchase-pay-btn.pay-on{border-color:#3b82f6;background:rgba(30,58,95,.4);color:#fff}
.purchase-entry-table{table-layout:fixed;width:100%;border-collapse:collapse}
.purchase-entry-table th,.purchase-entry-table td{vertical-align:middle;padding:0.2rem 0.25rem}
.purchase-entry-table .purchase-col-num{text-align:center;font-size:0.65rem;font-weight:700;color:#64748b}
.purchase-entry-table .purchase-col-product{min-width:0}
.purchase-entry-table .purchase-col-product .line-product-search{width:100%;min-width:0;box-sizing:border-box}
.purchase-entry-table .purchase-col-qty input,.purchase-entry-table .purchase-col-money input{text-align:center;font-variant-numeric:tabular-nums;padding-left:0.15rem;padding-right:0.15rem}
.purchase-entry-table .purchase-col-total{text-align:end;font-variant-numeric:tabular-nums;font-size:0.75rem}
.purchase-entry-table .purchase-col-del,.purchase-entry-table .purchase-col-add{text-align:center}
.purchase-entry-table .purchase-col-add #add-line-btn{flex-shrink:0}
.purchase-entry-table input{height:2rem!important;font-size:0.75rem!important;box-sizing:border-box}
.purchase-form--compact .purchase-entry-table th,.purchase-form--compact .purchase-entry-table td{padding:0.12rem 0.18rem}
.purchase-form--compact .purchase-entry-table col.purchase-col-unit{width:5.25rem!important}
.purchase-form--compact .purchase-entry-table col.purchase-col-qty{width:3.35rem!important}
.purchase-form--compact .purchase-entry-table col.purchase-col-money{width:3.35rem!important}
.purchase-form--compact .purchase-entry-table col.purchase-col-total{width:3.5rem!important}
.purchase-form--compact .purchase-entry-table col.purchase-col-del{width:2.1rem!important}
.purchase-form--compact .purchase-entry-table col.purchase-col-add{width:1.85rem!important}
.purchase-form--compact .purchase-entry-table input{height:1.7rem!important;font-size:0.6875rem!important}
.purchase-form--compact .purchase-entry-table .purchase-col-num{font-size:0.6rem}
.purchase-form--compact .purchase-entry-table thead th{font-size:0.65rem;line-height:1.15;padding:0.2rem 0.15rem}
/* خلايا الجدول اللاحقة تُرسم فوق السابقة؛ عند فتح اقتراح المنتج/الوحدة نرفع العمود النشط حتى لا تُقصّ القائمة تحت الخلايا المجاورة */
.purchase-entry-table td.purchase-col-product,
.purchase-entry-table td.purchase-col-unit{position:relative}
.purchase-line.purchase-line-popover-open-product>td.purchase-col-product{z-index:70}
.purchase-line.purchase-line-popover-open-product>td.purchase-col-unit{z-index:0}
.purchase-line.purchase-line-popover-open-unit>td.purchase-col-unit{z-index:70}
.purchase-line.purchase-line-popover-open-unit>td.purchase-col-product{z-index:0}
</style>
{% load static %}
<script src="{% static 'js/payment_splits_ui.js' %}"></script>
<script>
(function() {
  var cfg = document.getElementById('purchase-api-config');
  if (!cfg) return;
  var SEARCH_URL = cfg.dataset.searchUrl;
  var CREATE_URL = cfg.dataset.createUrl;
  var SUPPLIER_SEARCH_URL = cfg.dataset.supplierSearchUrl;
  var SUPPLIER_CREATE_URL = cfg.dataset.supplierCreateUrl;
  var UNIT_SEARCH_URL = cfg.dataset.unitSearchUrl;
  var UNIT_CREATE_URL = cfg.dataset.unitCreateUrl;
  var initialState = {};
  var stateNode = document.getElementById('purchase-form-state');
  if (stateNode) {
    try { initialState = JSON.parse(stateNode.textContent || '{}') || {}; } catch (e) { initialState = {}; }
  }

  function getCookie(name) {
    var m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? decodeURIComponent(m[2]) : '';
  }

  function debounce(fn, ms) {
    var t;
    return function() {
      var a = arguments, th = this;
      clearTimeout(t);
      t = setTimeout(function() { fn.apply(th, a); }, ms);
    };
  }

  function money(v) {
    var n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  }

  function focusEl(el) {
    if (el) setTimeout(function() { el.focus(); if (el.select) el.select(); }, 0);
  }

  function hideHits(hits) {
    if (!hits) return;
    hits.innerHTML = '';
    hits.classList.add('hidden');
    hits.classList.remove('purchase-ac-hits--fixed');
    hits.style.position = '';
    hits.style.top = '';
    hits.style.bottom = '';
    hits.style.left = '';
    hits.style.right = '';
    hits.style.insetInlineStart = '';
    hits.style.insetInlineEnd = '';
    hits.style.width = '';
    hits.style.minWidth = '';
    hits.style.maxWidth = '';
    hits.style.zIndex = '';
    hits.style.maxHeight = '';
    hits._purchasePinInput = null;
  }

  function clampNum(n, lo, hi) {
    if (n < lo) return lo;
    if (n > hi) return hi;
    return n;
  }

  /* يتجاوز overflow المودال/الجدول — فوق كل الطبقات مع عرض مقروء */
  function pinPurchaseAutocompleteToInput(hits, anchor) {
    if (!hits || !anchor || !anchor.getBoundingClientRect) return;
    var rect = anchor.getBoundingClientRect();
    var vw = window.innerWidth || document.documentElement.clientWidth || 640;
    var vh = window.innerHeight || document.documentElement.clientHeight || 480;
    var pad = 8;
    var minW = 280;
    var w = Math.max(rect.width * 1.2, minW);
    w = clampNum(w, minW, vw - 2 * pad);
    var cx = rect.left + rect.width / 2;
    var left = cx - w / 2;
    left = clampNum(left, pad, vw - w - pad);
    var top = rect.bottom + 2;
    var maxH = Math.min(320, vh - top - pad);
    hits.classList.add('purchase-ac-hits--fixed');
    hits.style.position = 'fixed';
    hits.style.left = left + 'px';
    hits.style.right = 'auto';
    hits.style.insetInlineStart = '';
    hits.style.insetInlineEnd = '';
    hits.style.top = top + 'px';
    hits.style.width = w + 'px';
    hits.style.minWidth = '';
    hits.style.zIndex = '60000';
    hits.style.maxHeight = maxH > 72 ? maxH + 'px' : Math.floor(vh * 0.35) + 'px';
    hits._purchasePinInput = anchor;
  }

  function refreshPinnedPurchaseAutocompletes() {
    var list = document.querySelectorAll('.purchase-ac-hits:not(.hidden)');
    if (!list.length) return;
    list.forEach(function(h) {
      var a = h._purchasePinInput;
      if (a && document.body.contains(a)) pinPurchaseAutocompleteToInput(h, a);
    });
  }

  window.addEventListener('scroll', refreshPinnedPurchaseAutocompletes, true);
  window.addEventListener('resize', refreshPinnedPurchaseAutocompletes);

  function hidePurchaseQuickAdd(nb) {
    if (!nb) return;
    nb.classList.add('hidden');
    nb.style.position = '';
    nb.style.top = '';
    nb.style.left = '';
    nb.style.right = '';
    nb.style.width = '';
    nb.style.zIndex = '';
  }

  function showPurchaseQuickAdd(nb) {
    if (nb) nb.classList.remove('hidden');
  }

  function firstVisibleEmptyRow() {
    var rows = Array.prototype.slice.call(document.querySelectorAll('.purchase-line'));
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].classList.contains('is-empty')) return rows[i];
    }
    return null;
  }

  function showRow(row) {
    if (!row) return;
    row.classList.add('is-visible');
    row.classList.remove('is-empty');
    row.style.display = '';
  }

  function ensureNextRow(row) {
    var rows = Array.prototype.slice.call(document.querySelectorAll('.purchase-line'));
    var idx = rows.indexOf(row);
    if (idx >= 0 && rows[idx + 1]) showRow(rows[idx + 1]);
    return idx >= 0 ? rows[idx + 1] : null;
  }

  function attachProductPicker(row) {
    var hid = row.querySelector('.line-product-id');
    var inp = row.querySelector('.line-product-search');
    var hits = row.querySelector('td.purchase-col-product .purchase-ac-hits');
    var newBox = row.querySelector('.purchase-ac-new');
    if (!hid || !inp || !hits || !newBox) return;

    var activeIdx = -1;

    function clearProductRowLift() {
      row.classList.remove('purchase-line-popover-open-product');
    }
    function liftProductRow() {
      row.classList.add('purchase-line-popover-open-product');
      row.classList.remove('purchase-line-popover-open-unit');
    }
    function hideProductHits() {
      hideHits(hits);
      clearProductRowLift();
    }

    function setUnit(id, label) {
      var unitHid = row.querySelector('.line-unit-id');
      var unitInp = row.querySelector('.line-unit-search');
      if (unitHid) unitHid.value = id || '';
      if (unitInp) unitInp.value = label || '';
    }

    function setSelected(id, label, unitId, unitName) {
      hid.value = id || '';
      inp.value = label || '';
      inp.dataset.purchaseLockedLabel = (label || '').trim();
      if (unitId || unitName) setUnit(unitId || '', unitName || '');
      hideProductHits();
      hidePurchaseQuickAdd(newBox);
      focusEl(row.querySelector('.line-qty'));
    }

    function renderHits(items) {
      hits.innerHTML = '';
      activeIdx = -1;
      if (!items.length) {
        hideProductHits();
        return;
      }
      items.forEach(function(it, i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'purchase-ac-hit' + (i === 0 ? ' ac-active' : '');
        b.textContent = it.name_ar + (it.unit_name ? ' — ' + it.unit_name : '') + (it.type === 'ready' ? ' (جاهز)' : ' (خام)');
        b.addEventListener('mousedown', function(e) {
          e.preventDefault();
          setSelected(String(it.id), it.name_ar, it.unit_id ? String(it.unit_id) : '', it.unit_name || '');
        });
        hits.appendChild(b);
      });
      hits.classList.remove('hidden');
      liftProductRow();
      activeIdx = items.length ? 0 : -1;
      requestAnimationFrame(function() {
        pinPurchaseAutocompleteToInput(hits, inp);
      });
    }

    var runSearch = debounce(function() {
      var q = inp.value.trim();
      var locked = (inp.dataset.purchaseLockedLabel || '').trim();
      if (hid.value && locked && q === locked) {
        hidePurchaseQuickAdd(newBox);
        hideProductHits();
        return;
      }
      hid.value = '';
      delete inp.dataset.purchaseLockedLabel;
      hidePurchaseQuickAdd(newBox);
      if (q.length < 1) {
        hideProductHits();
        return;
      }
      fetch(SEARCH_URL + '?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var items = data.results || [];
          renderHits(items);
          if (!items.length && q.length >= 2) {
            newBox.querySelectorAll('.quick-add-btn').forEach(function(btn) {
              btn.dataset.newName = q;
            });
            showPurchaseQuickAdd(newBox);
            liftProductRow();
          } else {
            hidePurchaseQuickAdd(newBox);
          }
        })
        .catch(function() { hideProductHits(); hidePurchaseQuickAdd(newBox); });
    }, 280);

    inp.addEventListener('input', function() {
      runSearch();
    });

    inp.addEventListener('keydown', function(e) {
      var btns = hits.querySelectorAll('.purchase-ac-hit');
      if (e.key === 'Tab' && btns.length) {
        e.preventDefault();
        activeIdx = 0;
        btns.forEach(function(b, j) { b.classList.toggle('ac-active', j === 0); });
        return;
      }
      if (e.key === 'Escape') {
        hideProductHits();
        hidePurchaseQuickAdd(newBox);
        return;
      }
      if (!btns.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = activeIdx < 0 ? 0 : Math.min(activeIdx + 1, btns.length - 1);
        btns.forEach(function(b, j) { b.classList.toggle('ac-active', j === activeIdx); });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = activeIdx < 0 ? 0 : Math.max(activeIdx - 1, 0);
        btns.forEach(function(b, j) { b.classList.toggle('ac-active', j === activeIdx); });
      } else if (e.key === 'Enter') {
        if (btns.length) {
          e.preventDefault();
          var idx = activeIdx >= 0 && activeIdx < btns.length ? activeIdx : 0;
          btns[idx].dispatchEvent(new MouseEvent('mousedown'));
        }
      }
    });

    newBox.querySelectorAll('.quick-add-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var name = (btn.dataset.newName || inp.value || '').trim();
        if (name.length < 2) return;
        var ptype = btn.getAttribute('data-ptype') || 'raw';
        var unitHid = row.querySelector('.line-unit-id');
        btn.disabled = true;
        fetch(CREATE_URL, {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
          },
          body: JSON.stringify({ name_ar: name, product_type: ptype, unit_id: unitHid ? unitHid.value : '' }),
        })
          .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, j: j }; }); })
          .then(function(_ref) {
            btn.disabled = false;
            if (!_ref.ok) {
              (window.shellToast || function(m){})(_ref.j.error || 'تعذّر الإنشاء', 'error');
              return;
            }
            setSelected(String(_ref.j.id), _ref.j.name_ar, _ref.j.unit_id ? String(_ref.j.unit_id) : '', _ref.j.unit_name || '');
          })
          .catch(function() { btn.disabled = false; (window.shellToast || function(m){})('خطأ شبكة', 'error'); });
      });
    });
  }

  function attachUnitPicker(row) {
    var hid = row.querySelector('.line-unit-id');
    var inp = row.querySelector('.line-unit-search');
    var hits = row.querySelector('.purchase-unit-hits');
    var newBox = row.querySelector('.purchase-unit-new');
    var createBtn = row.querySelector('.quick-add-unit-btn');
    if (!hid || !inp || !hits || !newBox) return;
    var activeIdx = -1;
    function clearUnitRowLift() {
      row.classList.remove('purchase-line-popover-open-unit');
    }
    function liftUnitRow() {
      row.classList.add('purchase-line-popover-open-unit');
      row.classList.remove('purchase-line-popover-open-product');
    }
    function hideUnitHits() {
      hideHits(hits);
      clearUnitRowLift();
    }
    function setSelected(id, label) {
      hid.value = id || '';
      inp.value = label || '';
      inp.dataset.purchaseLockedUnitLabel = (label || '').trim();
      hideUnitHits();
      hidePurchaseQuickAdd(newBox);
      focusEl(row.querySelector('.line-qty'));
    }
    var runSearch = debounce(function() {
      var q = inp.value.trim();
      var locked = (inp.dataset.purchaseLockedUnitLabel || '').trim();
      if (hid.value && locked && q === locked) {
        hidePurchaseQuickAdd(newBox);
        hideUnitHits();
        return;
      }
      hid.value = '';
      delete inp.dataset.purchaseLockedUnitLabel;
      hidePurchaseQuickAdd(newBox);
      if (q.length < 1) { hideUnitHits(); return; }
      fetch(UNIT_SEARCH_URL + '?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          hits.innerHTML = '';
          var rows = data.results || [];
          activeIdx = rows.length ? 0 : -1;
          rows.forEach(function(u, i) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'purchase-ac-hit' + (i === 0 ? ' ac-active' : '');
            b.textContent = u.name_ar;
            b.addEventListener('mousedown', function(e) { e.preventDefault(); setSelected(String(u.id), u.name_ar); });
            hits.appendChild(b);
          });
          if (rows.length) {
            hidePurchaseQuickAdd(newBox);
            hits.classList.remove('hidden');
            liftUnitRow();
            requestAnimationFrame(function() {
              pinPurchaseAutocompleteToInput(hits, inp);
            });
          } else {
            hideUnitHits();
            if (q.length >= 1) {
              createBtn.dataset.newName = q;
              showPurchaseQuickAdd(newBox);
              liftUnitRow();
            } else {
              hidePurchaseQuickAdd(newBox);
            }
          }
        });
    }, 220);
    inp.addEventListener('input', runSearch);
    inp.addEventListener('keydown', function(e) {
      var btns = hits.querySelectorAll('.purchase-ac-hit');
      if (e.key === 'Tab' && btns.length) {
        e.preventDefault();
        activeIdx = 0;
        btns.forEach(function(b, j) { b.classList.toggle('ac-active', j === 0); });
        return;
      }
      if (e.key === 'Escape') {
        hideUnitHits();
        hidePurchaseQuickAdd(newBox);
        return;
      }
      if (e.key === 'Enter' && btns.length) {
        e.preventDefault();
        var idx = activeIdx >= 0 && activeIdx < btns.length ? activeIdx : 0;
        btns[idx].dispatchEvent(new MouseEvent('mousedown'));
      }
    });
    createBtn.addEventListener('click', function() {
      var name = (createBtn.dataset.newName || inp.value || '').trim();
      if (!name) return;
      createBtn.disabled = true;
      fetch(UNIT_CREATE_URL, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        body: JSON.stringify({ name_ar: name }),
      })
        .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, j: j }; }); })
        .then(function(res) {
          createBtn.disabled = false;
          if (!res.ok) { (window.shellToast || function(m){})(res.j.error || 'تعذر إنشاء الوحدة', 'error'); return; }
          setSelected(String(res.j.id), res.j.name_ar);
        })
        .catch(function() { createBtn.disabled = false; (window.shellToast || function(m){})('خطأ شبكة', 'error'); });
    });
  }

  document.addEventListener('mousedown', function(ev) {
    if (
      ev.target.closest('.purchase-ac-hits') ||
      ev.target.closest('.purchase-ac-hit') ||
      ev.target.closest('.line-product-search') ||
      ev.target.closest('.purchase-ac-new') ||
      ev.target.closest('.line-unit-search') ||
      ev.target.closest('.purchase-unit-hits') ||
      ev.target.closest('.purchase-unit-new') ||
      ev.target.closest('#purchase-supplier-search') ||
      ev.target.closest('#purchase-supplier-new')
    )
      return;
    document.querySelectorAll('.purchase-ac-hits').forEach(function(h) {
      hideHits(h);
    });
    document.querySelectorAll('.purchase-line').forEach(function(r) {
      r.classList.remove('purchase-line-popover-open-product', 'purchase-line-popover-open-unit');
    });
    document.querySelectorAll('.purchase-line .purchase-ac-new, .purchase-line .purchase-unit-new').forEach(hidePurchaseQuickAdd);
    var supNew = document.getElementById('purchase-supplier-new');
    if (supNew) hidePurchaseQuickAdd(supNew);
  });


  document.querySelectorAll('.purchase-line').forEach(function(row) {
    attachProductPicker(row);
    attachUnitPicker(row);
  });

  var allLines = document.querySelectorAll('.purchase-line');
  allLines.forEach(function(row, i) {
    row.classList.add('is-empty');
    if (i === 0) showRow(row);
    else row.style.display = 'none';
  });
  var addBtn = document.getElementById('add-line-btn');
  if (addBtn) {
    addBtn.addEventListener('click', function() {
      var row = firstVisibleEmptyRow();
      showRow(row);
      focusEl(row && row.querySelector('.line-product-search'));
    });
  }

  function hydrateInitialState() {
    if (!initialState || !Object.keys(initialState).length) return;
    var sid = document.getElementById('purchase-supplier-id');
    var slabel = document.getElementById('purchase-supplier-label');
    var sinp = document.getElementById('purchase-supplier-search');
    if (sid && initialState.supplier_id) sid.value = initialState.supplier_id;
    if (slabel && initialState.supplier_label) slabel.value = initialState.supplier_label;
    if (sinp && initialState.supplier_label) sinp.value = initialState.supplier_label;

    (initialState.rows || []).forEach(function(rowState, i) {
      var row = allLines[i];
      if (!row) return;
      var hasData = rowState.product_id || rowState.product_label || rowState.unit_id || rowState.unit_label || rowState.qty || rowState.cost || rowState.discount;
      if (!hasData && i > 0) return;
      showRow(row);
      var productId = row.querySelector('.line-product-id');
      var productInput = row.querySelector('.line-product-search');
      var unitId = row.querySelector('.line-unit-id');
      var unitInput = row.querySelector('.line-unit-search');
      var qty = row.querySelector('.line-qty');
      var cost = row.querySelector('.line-cost');
      var discount = row.querySelector('.line-discount');
      if (productId) productId.value = rowState.product_id || '';
      if (productInput) {
        productInput.value = rowState.product_label || '';
        if (rowState.product_id && rowState.product_label) {
          productInput.dataset.purchaseLockedLabel = String(rowState.product_label).trim();
        } else {
          delete productInput.dataset.purchaseLockedLabel;
        }
      }
      if (unitId) unitId.value = rowState.unit_id || '';
      if (unitInput) {
        unitInput.value = rowState.unit_label || '';
        if (rowState.unit_id && rowState.unit_label) {
          unitInput.dataset.purchaseLockedUnitLabel = String(rowState.unit_label).trim();
        } else {
          delete unitInput.dataset.purchaseLockedUnitLabel;
        }
      }
      if (qty) qty.value = rowState.qty || '';
      if (cost) cost.value = rowState.cost || '';
      if (discount) discount.value = rowState.discount || '';
      [qty, cost, discount].forEach(function(el) { if (el) el.dispatchEvent(new Event('input', { bubbles: true })); });
    });
    if (generalDiscount && initialState.general_discount) generalDiscount.value = initialState.general_discount;
    if (paidInput && initialState.pay_amount) paidInput.value = initialState.pay_amount;
    recalcTotal();
  }

  function focusFirstInvalidAfterError() {
    if (!document.querySelector('.bg-danger\\/5')) return;
    var sid = document.getElementById('purchase-supplier-id');
    var sinp = document.getElementById('purchase-supplier-search');
    if (sid && !sid.value && sinp) return focusEl(sinp);
    var rows = Array.prototype.slice.call(document.querySelectorAll('.purchase-line.is-visible'));
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var productId = r.querySelector('.line-product-id');
      var productInput = r.querySelector('.line-product-search');
      var qty = r.querySelector('.line-qty');
      var cost = r.querySelector('.line-cost');
      if (productInput && productInput.value && productId && !productId.value) return focusEl(productInput);
      if (productId && productId.value && qty && !qty.value) return focusEl(qty);
      if (productId && productId.value && cost && !cost.value) return focusEl(cost);
    }
    var firstProduct = document.querySelector('.purchase-line.is-visible .line-product-search');
    if (firstProduct) focusEl(firstProduct);
  }

  document.querySelectorAll('.remove-line-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var row = btn.closest('tr');
      row.querySelectorAll('input[type="number"]').forEach(function(inp) { inp.value = ''; });
      var hid = row.querySelector('.line-product-id');
      var sinp = row.querySelector('.line-product-search');
      var unitHid = row.querySelector('.line-unit-id');
      var unitInp = row.querySelector('.line-unit-search');
      if (hid) hid.value = '';
      if (sinp) {
        sinp.value = '';
        delete sinp.dataset.purchaseLockedLabel;
      }
      if (unitHid) unitHid.value = '';
      if (unitInp) {
        unitInp.value = '';
        delete unitInp.dataset.purchaseLockedUnitLabel;
      }
      var ph = row.querySelector('td.purchase-col-product .purchase-ac-hits');
      var uh = row.querySelector('.purchase-unit-hits');
      if (ph) hideHits(ph);
      if (uh) hideHits(uh);
      row.classList.remove('purchase-line-popover-open-product', 'purchase-line-popover-open-unit');
      var nb = row.querySelector('.purchase-ac-new');
      if (nb) hidePurchaseQuickAdd(nb);
      var unb = row.querySelector('.purchase-unit-new');
      if (unb) hidePurchaseQuickAdd(unb);
      row.style.display = 'none';
      row.classList.add('is-empty');
      row.classList.remove('is-visible');
      var lt = row.querySelector('.line-total');
      if (lt) lt.textContent = '0.00';
      if (typeof recalcTotal === 'function') recalcTotal();
    });
  });

  document.querySelectorAll('.line-qty, .line-cost, .line-discount').forEach(function(inp) {
    inp.addEventListener('input', function() {
      var idx = inp.dataset.idx;
      var qEl = document.querySelector('.line-qty[data-idx="' + idx + '"]');
      var cEl = document.querySelector('.line-cost[data-idx="' + idx + '"]');
      var dEl = document.querySelector('.line-discount[data-idx="' + idx + '"]');
      var tEl = document.querySelector('.line-total[data-idx="' + idx + '"]');
      if (!qEl || !cEl || !tEl) return;
      var q = money(qEl.value);
      var c = money(cEl.value);
      var d = dEl ? money(dEl.value) : 0;
      var t = Math.max((q * c) - d, 0).toFixed(2);
      tEl.textContent = (q > 0 && c > 0) ? t : '0.00';
      if (typeof recalcTotal === 'function') recalcTotal();
    });
    inp.addEventListener('keydown', function(e) {
      var row = inp.closest('.purchase-line');
      if (e.key === 'Enter') {
        e.preventDefault();
        if (inp.classList.contains('line-qty')) focusEl(row.querySelector('.line-cost'));
        else if (inp.classList.contains('line-cost')) focusEl(row.querySelector('.line-discount'));
        else if (inp.classList.contains('line-discount')) {
          var next = ensureNextRow(row);
          focusEl(next && next.querySelector('.line-product-search'));
        }
      }
    });
  });

  var generalDiscount = document.getElementById('purchase-general-discount');
  var paidInput = document.getElementById('purchase-paid-amount');
  var splitToggle = document.getElementById('purchase-split-pay-toggle');
  var paySingleWrap = document.getElementById('purchase-pay-single');
  var splitsWrap = document.getElementById('purchase-pay-splits-wrap');
  var splitsTbody = document.getElementById('purchase-pay-splits-tbody');
  var splitsJson = document.getElementById('purchase-payment-splits-json');
  var splitAddBtn = document.getElementById('purchase-pay-split-add');
  var splitSumHint = document.getElementById('purchase-pay-split-sum-hint');
  var methodHidden = document.getElementById('purchase-pay-method');
  var payBtns = document.querySelectorAll('.purchase-pay-btn');
  var PURCHASE_PM_ROWS = [];
  payBtns.forEach(function(b) {
    PURCHASE_PM_ROWS.push({
      code: (b.dataset.code || '').trim().toLowerCase(),
      label_ar: (b.textContent || '').trim(),
      ledger: b.dataset.ledger || '',
    });
  });

  function purchaseNetFromDom() {
    var el = document.getElementById('purchase-net-total');
    return money(el && el.textContent);
  }

  var purchaseSplitsApi = null;

  function recalcTotal() {
    var subtotal = 0;
    document.querySelectorAll('.line-total').forEach(function(el) {
      var v = parseFloat(el.textContent);
      if (!isNaN(v)) subtotal += v;
    });
    var discount = money(generalDiscount && generalDiscount.value);
    var net = Math.max(subtotal - discount, 0);
    var paid;
    var rem;
    if (purchaseSplitsApi && purchaseSplitsApi.splitMode()) {
      paid = purchaseSplitsApi.rowsSum();
      rem = Math.max(net - paid, 0);
      purchaseSplitsApi.serialize();
      purchaseSplitsApi.syncHint();
    } else {
      paid = money(paidInput && paidInput.value);
      rem = Math.max(net - paid, 0);
    }
    var subEl = document.getElementById('purchase-subtotal');
    var netEl = document.getElementById('purchase-net-total');
    var remEl = document.getElementById('purchase-remaining');
    if (subEl) subEl.textContent = subtotal.toFixed(2);
    if (netEl) netEl.textContent = net.toFixed(2);
    if (remEl) remEl.textContent = rem.toFixed(2);
  }
  window.recalcTotal = recalcTotal;
  if (generalDiscount) generalDiscount.addEventListener('input', recalcTotal);
  if (paidInput) paidInput.addEventListener('input', recalcTotal);

  purchaseSplitsApi = PaymentSplitsUI.bind({
    form: document.getElementById('purchase-form'),
    getTargetAmount: purchaseNetFromDom,
    splitToggle: splitToggle,
    paySingleWrap: paySingleWrap,
    splitsWrap: splitsWrap,
    splitsTbody: splitsTbody,
    splitsJson: splitsJson,
    splitAddBtn: splitAddBtn,
    splitSumHint: splitSumHint,
    methodHidden: methodHidden,
    payBtns: payBtns,
    stateNode: stateNode,
    pmRows: PURCHASE_PM_ROWS,
    requireExactSum: false,
    rejectOverTarget: true,
    splitMethodSelectClass: 'purchase-split-m',
    splitAmountInputClass: 'purchase-split-amt',
    sumOverMsg: 'مجموع أسطر الدفع أكبر من صافي الفاتورة.',
    onChange: recalcTotal,
    onPayMethodSelect: function(btn) {
      if (btn && btn.dataset.ledger === 'ar' && paidInput) paidInput.value = '0.00';
    },
    syncHintCustom: function(ctx) {
      if (!splitSumHint) return;
      var net = ctx.target;
      var sum = ctx.sum;
      var r = net - sum;
      splitSumHint.textContent =
        'المجموع: ' +
        sum.toFixed(2) +
        ' — الصافي: ' +
        net.toFixed(2) +
        (r > 0.005 ? ' — سيُضاف آجل: ' + r.toFixed(2) : r < -0.005 ? ' — يتجاوز الصافي' : '');
    },
  });

  // Supplier search / create
  (function attachSupplierPicker() {
    var hid = document.getElementById('purchase-supplier-id');
    var inp = document.getElementById('purchase-supplier-search');
    var hits = document.getElementById('purchase-supplier-hits');
    var newBox = document.getElementById('purchase-supplier-new');
    var createBtn = document.getElementById('purchase-supplier-create');
    if (!hid || !inp || !hits) return;
    var activeIdx = -1;
    function setSupplier(id, label) {
      hid.value = id || '';
      inp.value = label || '';
      var labelHidden = document.getElementById('purchase-supplier-label');
      if (labelHidden) labelHidden.value = label || '';
      hideHits(hits);
      if (newBox) hidePurchaseQuickAdd(newBox);
      focusEl(document.querySelector('.line-product-search'));
    }
    var run = debounce(function() {
      var q = inp.value.trim();
      hid.value = '';
      if (newBox) hidePurchaseQuickAdd(newBox);
      if (q.length < 1) { hideHits(hits); return; }
      fetch(SUPPLIER_SEARCH_URL + '?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          hits.innerHTML = '';
          var rows = data.results || [];
          activeIdx = rows.length ? 0 : -1;
          rows.forEach(function(s, i) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'purchase-ac-hit' + (i === 0 ? ' ac-active' : '');
            b.textContent = s.name_ar + (s.phone ? ' — ' + s.phone : '');
            b.addEventListener('mousedown', function(e) { e.preventDefault(); setSupplier(String(s.id), s.name_ar); });
            hits.appendChild(b);
          });
          if (rows.length) {
            if (newBox) hidePurchaseQuickAdd(newBox);
            hits.classList.remove('hidden');
            requestAnimationFrame(function() {
              pinPurchaseAutocompleteToInput(hits, inp);
            });
          }
          else { hideHits(hits); if (q.length >= 2 && newBox) showPurchaseQuickAdd(newBox); }
        });
    }, 220);
    inp.addEventListener('input', run);
    inp.addEventListener('keydown', function(e) {
      var btns = hits.querySelectorAll('.purchase-ac-hit');
      if (e.key === 'Tab' && btns.length) {
        e.preventDefault();
        activeIdx = 0;
        btns.forEach(function(b, j) { b.classList.toggle('ac-active', j === 0); });
        return;
      }
      if (e.key === 'Escape') {
        hideHits(hits);
        if (newBox) hidePurchaseQuickAdd(newBox);
        return;
      }
      if (e.key === 'Enter' && btns.length) {
        e.preventDefault();
        var idx = activeIdx >= 0 && activeIdx < btns.length ? activeIdx : 0;
        btns[idx].dispatchEvent(new MouseEvent('mousedown'));
      }
    });
    if (createBtn) createBtn.addEventListener('click', function() {
      var name = inp.value.trim();
      if (name.length < 2) return;
      createBtn.disabled = true;
      fetch(SUPPLIER_CREATE_URL, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        body: JSON.stringify({ name_ar: name }),
      })
        .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, j: j }; }); })
        .then(function(res) {
          createBtn.disabled = false;
          if (!res.ok) { (window.shellToast || function(m){})(res.j.error || 'تعذر إنشاء المورد', 'error'); return; }
          setSupplier(String(res.j.id), res.j.name_ar);
        })
        .catch(function() { createBtn.disabled = false; (window.shellToast || function(m){})('خطأ شبكة', 'error'); });
    });
  })();

  hydrateInitialState();
  focusFirstInvalidAfterError();
  recalcTotal();
})();
</script>

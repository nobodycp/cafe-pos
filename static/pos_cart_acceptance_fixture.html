<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>POS cart layout fixture (mirrors templates/pos/_cart_fragment.html layout rules)</title>
<style>
  body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: #cbd5e1; font-family: system-ui, sans-serif; }
  .bar { flex: 0 0 auto; padding: 6px 10px; background: #1e3a5f; color: #fff; font-size: 11px; display: flex; gap: 10px; flex-wrap: wrap; }
  .bar a { color: #a7f3d0; }
  .wrap { flex: 1 1 auto; min-height: 0; display: flex; padding: 6px; }
  #pos-cart.pos-cart-column {
    width: clamp(240px, 32vw, 480px); min-width: 232px; max-width: min(500px, 42vw); height: 100%; min-height: 0; display: flex; flex-direction: column;
    border: 2px solid #475569; background: #fff;
  }
  .pos-cart-inner { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; height: 100%; font-size: 11px; overflow: hidden; }
  .pos-cart-header-zone { flex: 0 0 auto; max-height: 150px; min-height: 0; overflow: auto; }
  .pos-cart-order-strip { padding: 4px 6px; border-bottom: 1px solid #e5e7eb; font-size: 10px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pos-cart-total-bar { background: #0a0a0a; color: #eee; padding: 4px 6px; border-bottom: 2px solid #404040; }
  .pos-cart-total-bar__grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 4px 8px; direction: ltr; align-items: center; }
  .pos-ctb-hero-amt { font-size: 1.45rem; font-weight: 900; color: #34d399; }
  .pos-cart-table-region { flex: 1 1 0%; min-height: 0; display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid #e5e7eb; }
  .pos-cart-table-scroll { flex: 1 1 auto; min-height: 0; height: 100%; overflow-y: auto; overflow-x: hidden; background: #fff; }
  .pos-cart-empty { min-height: 100%; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 11px; }
  .pos-cart-lines { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 10px; }
  .pos-cart-lines thead th { position: sticky; top: 0; z-index: 2; padding: 2px 4px; background: #f1f5f9; height: 28px; border-bottom: 1px solid #cbd5e1; }
  .pos-cart-lines tbody tr.cart-line-item { height: 42px; max-height: 42px; }
  .pos-cart-lines tbody td { padding: 1px 4px; border-bottom: 1px solid #e5e7eb; max-height: 42px; overflow: hidden; vertical-align: middle; }
  .pos-line-name-one { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
  .pos-cart-bottom { flex: 0 0 auto; max-height: 170px; min-height: 0; overflow: auto; display: flex; flex-direction: column; gap: 2px; padding: 4px 6px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
  .pos-discount-note-row { display: flex; flex-wrap: nowrap; gap: 6px; align-items: center; overflow-x: auto; font-size: 10px; padding-bottom: 2px; border-bottom: 1px dashed #cbd5e1; }
  .pos-cart-toolbar { display: flex; flex-wrap: nowrap; gap: 2px; overflow-x: auto; min-height: 26px; max-height: 30px; }
  .tb-btn { min-height: 24px; padding: 0 5px; font-size: 9px; border: 1px solid #d1d5db; border-radius: 3px; background: #fff; flex: 0 0 auto; }
  #pay-methods { display: flex; flex-wrap: nowrap; gap: 2px; overflow-x: auto; }
  #pay-methods .pm-btn { flex: 1 0 auto; min-width: 2.75rem; height: 26px; font-size: 8px; border: 1px solid #cbd5e1; border-radius: 3px; background: #fff; white-space: nowrap; }
  .pos-checkout-row3 { display: flex; flex-wrap: nowrap; border: 1px solid #0f172a; min-height: 34px; max-height: 40px; }
  .pos-ca-btn { flex: 0 0 auto; min-width: 2.75rem; font-size: 9px; font-weight: 800; color: #fff; border: none; padding: 2px 4px; }
  .pos-ca-cancel { background: #dc2626; }
  .pos-ca-hold { background: #b45309; }
  .pos-ca-pay { flex: 1 1 45%; min-width: 5rem; background: #059669; font-size: 11px; font-weight: 900; }
  .pos-ca-amt-wrap { flex: 0 0 auto; background: #fde68a; padding: 0 4px; display: flex; align-items: center; }
  .pos-ca-amt-wrap input { width: 5.5rem; height: 28px; font-size: 11px; }
  .hint { font-size: 7px; color: #64748b; margin: 0; }
</style>
</head>
<body>
  <div class="bar">Layout fixture (open from running dev server). <a href="?rows=2&amp;tall=1">2 items · tall</a> · <a href="?rows=10">10 items</a> · <a href="?rows=2">2 items</a></div>
  <div class="wrap" id="fv">
    <div id="pos-cart" class="pos-cart-column" dir="rtl">
      <div class="pos-cart-inner">
        <div class="pos-cart-header-zone">
          <div class="pos-cart-order-strip"><b style="color:#1e3a5f">#999</b> صالة · طاولة 1</div>
          <div class="pos-cart-total-bar">
            <div class="pos-cart-total-bar__grid">
              <div style="font-size:10px">خصم 0 · مدفوع 0</div>
              <div style="text-align:center"><div style="font-size:9px;color:#a3a3a3">المتبقي</div><div class="pos-ctb-hero-amt">48.00 ر.س</div></div>
              <div style="font-size:10px;text-align:right">صافي 48</div>
            </div>
          </div>
        </div>
        <div class="pos-cart-table-region">
          <div class="pos-cart-table-scroll" id="scroll">
            <table class="pos-cart-lines">
              <thead><tr><th style="width:22px">#</th><th>الاسم</th><th style="width:68px">كمية</th><th style="width:52px">سعر</th><th style="width:40px">خصم</th><th style="width:52px">مجموع</th><th style="width:22px"></th></tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>
        <div class="pos-cart-bottom" id="pos-cart-bottom-dock">
          <div class="pos-discount-note-row"><span>خصم:</span><input size="3" style="height:20px" value="0"><span>%</span><input size="2" style="height:20px" value="0"><span style="margin-inline-start:6px">ملاحظة:</span><input style="flex:1;min-width:48px;height:20px"></div>
          <div class="pos-cart-toolbar">
            <button type="button" class="tb-btn">حذف</button><button type="button" class="tb-btn">ملاحظة</button><button type="button" class="tb-btn">سعر</button><button type="button" class="tb-btn">كمية</button>
            <button type="button" class="tb-btn">طاولات</button><button type="button" class="tb-btn">جديد</button><button type="button" class="tb-btn">درج</button>
          </div>
          <div id="pay-methods" dir="rtl">
            <button type="button" class="pm-btn">نقد</button><button type="button" class="pm-btn">بطاقة</button><button type="button" class="pm-btn">تحويل</button><button type="button" class="pm-btn">آجل</button>
          </div>
          <p class="hint">دفعات جزئية: غيّر المبلغ دون إغلاق الطاولة.</p>
          <div class="pos-checkout-row3" dir="ltr">
            <button type="button" class="pos-ca-btn pos-ca-cancel">إلغاء</button>
            <button type="button" class="pos-ca-btn pos-ca-hold">تعليق</button>
            <button type="button" class="pos-ca-btn pos-ca-pay">دفع F9</button>
            <div class="pos-ca-amt-wrap"><input value="48.00"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var n = Math.min(25, Math.max(0, parseInt(p.get('rows')||'2',10)||0));
  if (p.get('tall')==='1') document.getElementById('fv').style.minHeight = '820px';
  var tb = document.getElementById('tbody');
  tb.innerHTML = '';
  for (var i=1;i<=n;i++) {
    var tr = document.createElement('tr');
    tr.className = 'cart-line-item';
    tr.innerHTML = '<td class="text-center">'+i+'</td><td><span class="pos-line-name-one">صنف '+i+' — وصف طويل للتأكد من القص</span></td><td class="text-center">1</td><td class="text-center">12</td><td class="text-center">—</td><td class="text-end">12</td><td></td>';
    tb.appendChild(tr);
  }
  if (n===0) document.getElementById('scroll').innerHTML = '<div class="pos-cart-empty">السلة فارغة</div>';
})();
</script>
</body>
</html>
